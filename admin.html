<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel admin · Copa Bon Bon Bum 2026</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800;900&family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="_shared.js"></script>

<style>
  body { background: var(--gris-bg); overflow: hidden; }

  .layout {
    display: grid;
    grid-template-rows: 64px 1fr;
    grid-template-columns: 260px 1fr;
    grid-template-areas:
      "topbar topbar"
      "sidebar main";
    height: 100vh;
  }

  /* TOPBAR */
  .topbar {
    grid-area: topbar;
    background: var(--blanco);
    border-bottom: 3px solid var(--rojo);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    box-shadow: var(--shadow);
    z-index: 100;
  }
  .topbar-brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .topbar-mark {
    width: 36px;
    height: 36px;
    background: var(--rojo);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--amarillo);
    font-family: 'Nunito', sans-serif;
    font-size: 20px;
    font-weight: 900;
  }
  .topbar-titulo {
    font-family: 'Nunito', sans-serif;
    font-size: 17px;
    font-weight: 800;
  }
  .topbar-titulo small {
    display: block;
    font-size: 10px;
    color: var(--rojo);
    letter-spacing: 2px;
    font-weight: 700;
    font-family: 'Mulish', sans-serif;
    margin-top: 2px;
  }

  .topbar-user {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .user-info {
    text-align: right;
    line-height: 1.2;
  }
  .user-nombre {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 14px;
  }
  .user-rol {
    font-size: 11px;
    color: var(--gris);
    letter-spacing: 1px;
    font-weight: 700;
  }
  .user-avatar {
    width: 38px;
    height: 38px;
    background: var(--amarillo);
    color: var(--texto);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 15px;
  }

  /* SIDEBAR */
  .sidebar {
    grid-area: sidebar;
    background: var(--texto);
    color: var(--blanco);
    overflow-y: auto;
    padding: 20px 0;
  }
  .menu-grupo {
    padding: 0 16px;
    margin-bottom: 20px;
  }
  .menu-grupo-titulo {
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    font-weight: 800;
    padding: 8px 12px;
    margin-bottom: 4px;
  }
  .menu-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 12px;
    border-radius: 10px;
    color: rgba(255,255,255,0.75);
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    transition: all 0.15s;
    cursor: pointer;
    border-left: 3px solid transparent;
    margin-left: -3px;
  }
  .menu-item:hover {
    background: rgba(255,255,255,0.08);
    color: var(--blanco);
  }
  .menu-item.activo {
    background: rgba(227,6,19,0.18);
    color: var(--blanco);
    border-left-color: var(--rojo);
  }
  .menu-icon { font-size: 18px; }

  .sidebar-foot {
    padding: 16px;
    border-top: 1px solid rgba(255,255,255,0.1);
    margin-top: 20px;
  }
  .btn-logout {
    width: 100%;
    background: transparent;
    color: rgba(255,255,255,0.7);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 700;
    transition: all 0.2s;
    font-family: 'Nunito', sans-serif;
  }
  .btn-logout:hover { background: var(--rojo); color: var(--blanco); border-color: var(--rojo); }

  /* MAIN */
  .main {
    grid-area: main;
    overflow-y: auto;
    background: var(--gris-bg);
  }
  #childFrame {
    width: 100%;
    height: 100%;
    border: none;
    background: var(--bg);
  }

  /* MOBILE */
  @media (max-width: 768px) {
    .layout {
      grid-template-columns: 1fr;
      grid-template-areas:
        "topbar"
        "main";
    }
    .sidebar {
      position: fixed;
      top: 64px;
      left: 0;
      width: 260px;
      height: calc(100vh - 64px);
      z-index: 50;
      transform: translateX(-100%);
      transition: transform 0.3s;
    }
    .sidebar.abierto { transform: translateX(0); }
    .menu-toggle {
      display: block;
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      padding: 4px 12px;
      margin-right: 8px;
    }
  }
  @media (min-width: 769px) {
    .menu-toggle { display: none; }
  }

  .menu-toggle {
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
    padding: 4px 8px;
    margin-right: 8px;
  }
</style>
</head>
<body>

<div class="layout">

  <header class="topbar">
    <div class="topbar-brand">
      <button class="menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('abierto')">☰</button>
      <div class="topbar-mark">B</div>
      <div class="topbar-titulo">
        Copa Bon Bon Bum
        <small>PANEL ADMIN · 2026</small>
      </div>
    </div>
    <div class="topbar-user">
      <div class="user-info">
        <div class="user-nombre" id="userNombre">...</div>
        <div class="user-rol" id="userRol">...</div>
      </div>
      <div class="user-avatar" id="userAvatar">?</div>
    </div>
  </header>

  <aside class="sidebar">

    <div class="menu-grupo">
      <div class="menu-grupo-titulo">Principal</div>
      <a class="menu-item" data-page="admin-dashboard.html">
        <span class="menu-icon">📊</span> Dashboard
      </a>
    </div>

    <div class="menu-grupo">
      <div class="menu-grupo-titulo">Inscripciones</div>
      <a class="menu-item" data-page="admin-clubes.html">
        <span class="menu-icon">🏆</span> Clubes
      </a>
      <a class="menu-item" data-page="admin-equipos.html">
        <span class="menu-icon">⚽</span> Equipos
      </a>
      <a class="menu-item" data-page="admin-jugadores.html">
        <span class="menu-icon">👥</span> Jugadores
      </a>
      <a class="menu-item" data-page="admin-ct.html">
        <span class="menu-icon">👔</span> Cuerpo técnico
      </a>
    </div>

    <div class="menu-grupo">
      <div class="menu-grupo-titulo">Torneo</div>
      <a class="menu-item" data-page="admin-partidos.html">
        <span class="menu-icon">📅</span> Partidos
      </a>
      <a class="menu-item" data-page="admin-tablas.html">
        <span class="menu-icon">📈</span> Tablas y llaves
      </a>
      <a class="menu-item" data-page="admin-alertas.html">
        <span class="menu-icon">🔔</span> Alertas
      </a>
    </div>

    <div class="menu-grupo">
      <div class="menu-grupo-titulo">Sistema</div>
      <a class="menu-item" data-page="admin-sistema.html">
        <span class="menu-icon">⚙️</span> Patrocinadores, sedes
      </a>
    </div>

    <div class="sidebar-foot">
      <button class="btn-logout" onclick="cerrarSesion()">Cerrar sesión</button>
    </div>

  </aside>

  <main class="main">
    <iframe id="childFrame" src="admin-dashboard.html"></iframe>
  </main>

</div>

<script>
// Verificar autenticación
if (!requireAuth([ROLES.ADMIN])) {
  // requireAuth ya redirigió
} else {
  // Mostrar datos del usuario
  const nombre = getNombre() || 'Usuario';
  const rol = getRol() || '';
  document.getElementById('userNombre').textContent = nombre;
  document.getElementById('userRol').textContent = rol;
  document.getElementById('userAvatar').textContent = siglas(nombre);
}

// Navegación entre páginas
function navigateTo(page) {
  document.getElementById('childFrame').src = page;
  document.querySelectorAll('.menu-item').forEach(m => {
    m.classList.toggle('activo', m.dataset.page === page);
  });
  // Cerrar sidebar en mobile
  document.querySelector('.sidebar').classList.remove('abierto');
}

document.querySelectorAll('.menu-item').forEach(item => {
  item.addEventListener('click', (e) => {
    e.preventDefault();
    navigateTo(item.dataset.page);
  });
});

// Marcar la primera como activa
document.querySelector('.menu-item[data-page="admin-dashboard.html"]').classList.add('activo');

async function cerrarSesion() {
  const ok = await confirmar('¿Cerrar sesión?', { txtSi: 'Sí, salir', peligroso: false });
  if (ok) logout();
}

// Permitir que los iframes hijos cambien de página llamando window.parent.navigateTo
window.navigateTo = navigateTo;
</script>

</body>
</html>
