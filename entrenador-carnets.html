<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carnets — Copa Bon Bon Bum 2026</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800;900&family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="_shared.js"></script>

<style>
  :root {
    --rojo: #E30613;
    --rojo-osc: #B30410;
    --amarillo: #FFCC00;
    --amarillo-osc: #E6B800;
    --texto: #1a1a1a;
    --texto-2: #555;
    --gris: #888;
    --gris-cl: #e0e0e0;
    --gris-bg: #f5f5f5;
    --blanco: #ffffff;
    --verde: #2DA94F;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--gris-bg);
    font-family: 'Mulish', sans-serif;
    color: var(--texto);
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }

  /* CONTROLES */
  .controls {
    position: sticky;
    top: 0;
    background: var(--texto);
    color: var(--blanco);
    padding: 14px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    flex-wrap: wrap;
  }
  .controls-info { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 14px; }
  .controls-info small {
    display: block; font-weight: 500; font-size: 11px;
    color: rgba(255,255,255,0.7); margin-top: 2px;
  }
  .controls-acciones { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .btn-ctrl {
    padding: 8px 14px; border: none; border-radius: 8px;
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 13px;
    cursor: pointer; text-decoration: none;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-ctrl-secundario { background: rgba(255,255,255,0.15); color: var(--blanco); }
  .btn-ctrl-secundario:hover { background: rgba(255,255,255,0.25); }
  .btn-ctrl-primario { background: var(--rojo); color: var(--blanco); }
  .btn-ctrl-primario:hover { background: var(--rojo-osc); }
  .toggle-todos {
    display: flex; align-items: center; gap: 6px; font-size: 13px;
    cursor: pointer; color: rgba(255,255,255,0.9);
  }
  .toggle-todos input { cursor: pointer; }

  /* PÁGINA */
  .page-container {
    padding: 24px; display: flex; flex-direction: column;
    align-items: center; gap: 24px;
  }
  .page {
    background: var(--blanco);
    width: 215.9mm;
    height: 279.4mm;
    padding: 8mm;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: repeat(4, 1fr);
    gap: 4mm;
    box-shadow: 0 6px 24px rgba(0,0,0,0.12);
    page-break-after: always;
    overflow: hidden;
  }
  .page:last-child { page-break-after: auto; }

  /* CARNET (más compacto para 8 por hoja) */
  .carnet {
    border: 1.5px solid var(--gris-cl);
    border-radius: 3mm;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: var(--blanco);
    position: relative;
    page-break-inside: avoid;
  }

  .carnet-header {
    background: var(--amarillo);
    color: var(--texto);
    padding: 1.5mm 2.5mm;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1.2px solid var(--texto);
  }
  .carnet-header-club {
    display: flex; align-items: center; gap: 1.5mm;
    flex: 1; min-width: 0;
  }
  .carnet-escudo {
    width: 6.5mm; height: 6.5mm;
    background: var(--blanco);
    border-radius: 1mm;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    font-family: 'Nunito', sans-serif; font-weight: 900;
    font-size: 6pt; color: var(--rojo);
    flex-shrink: 0;
  }
  .carnet-escudo img { width: 100%; height: 100%; object-fit: cover; }
  .carnet-equipo-nombre {
    font-family: 'Nunito', sans-serif; font-weight: 900;
    font-size: 7.5pt; line-height: 1.1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex: 1;
  }
  .carnet-categoria-badge {
    background: var(--rojo); color: var(--blanco);
    padding: 0.8mm 2mm; border-radius: 2.5mm;
    font-family: 'Nunito', sans-serif; font-weight: 900;
    font-size: 7pt; letter-spacing: 0.3pt;
    flex-shrink: 0;
  }

  .carnet-body {
    flex: 1;
    padding: 2.5mm;
    display: flex;
    gap: 2.5mm;
    overflow: hidden;
  }
  .carnet-foto {
    width: 18mm; height: 23mm;
    background: var(--gris-bg);
    border-radius: 1.5mm;
    border: 1px solid var(--gris-cl);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; flex-shrink: 0;
  }
  .carnet-foto img { width: 100%; height: 100%; object-fit: cover; }
  .carnet-foto-placeholder { color: var(--gris); font-size: 16pt; }

  .carnet-datos {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }
  .carnet-nombre {
    font-family: 'Nunito', sans-serif; font-weight: 900;
    font-size: 8.5pt; line-height: 1.1;
    color: var(--texto);
    border-bottom: 1.2px solid var(--rojo);
    padding-bottom: 1mm; margin-bottom: 1mm;
    word-break: break-word;
  }
  .carnet-dato {
    font-size: 6.8pt; line-height: 1.35;
    color: var(--texto-2);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .carnet-dato strong {
    color: var(--texto); font-weight: 800;
    margin-right: 0.8mm; font-size: 6.2pt;
    text-transform: uppercase; letter-spacing: 0.2pt;
  }
  .carnet-sangre {
    display: inline-block;
    background: var(--rojo); color: var(--blanco);
    padding: 0.3mm 1.5mm; border-radius: 1mm;
    font-family: 'Nunito', sans-serif; font-weight: 900;
    font-size: 7pt; margin-left: 1mm;
  }
  .carnet-pos {
    margin-top: auto;
    align-self: flex-start;
    background: var(--amarillo); color: var(--texto);
    padding: 0.8mm 2mm; border-radius: 1.2mm;
    font-family: 'Nunito', sans-serif; font-weight: 800;
    font-size: 7pt; text-transform: uppercase;
  }
  .carnet-pos.ct { background: var(--rojo); color: var(--blanco); }

  .carnet-dorsal {
    position: absolute;
    bottom: 6mm; right: 2.5mm;
    width: 11mm; height: 11mm;
    background: var(--rojo); color: var(--blanco);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Nunito', sans-serif; font-weight: 900;
    font-size: 13pt;
    box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    line-height: 1;
  }
  .carnet-dorsal.sin { background: var(--gris-cl); color: var(--gris); font-size: 7pt; }

  .carnet-footer {
    background: var(--rojo); color: var(--blanco);
    padding: 1mm 2.5mm;
    font-family: 'Nunito', sans-serif; font-size: 5.5pt;
    text-align: center; font-weight: 700; letter-spacing: 0.3pt;
  }

  .loading, .empty {
    width: 100%; text-align: center; padding: 60px 20px; color: var(--gris);
  }
  .empty h3 {
    font-family: 'Nunito', sans-serif; font-weight: 900;
    color: var(--texto); margin-bottom: 6px;
  }

  @page { size: letter portrait; margin: 0; }

  @media print {
    body { background: var(--blanco); }
    .controls, .no-print { display: none !important; }
    .page-container { padding: 0; gap: 0; }
    .page { box-shadow: none; margin: 0; }
    .carnet { border: 1.2px dashed #999; }
  }
</style>
</head>
<body>

  <div class="controls no-print">
    <div class="controls-info">
      <span id="ctrlTitulo">Carnets oficiales</span>
      <small id="ctrlSubtitulo">Copa Bon Bon Bum 2026</small>
    </div>
    <div class="controls-acciones">
      <label class="toggle-todos">
        <input type="checkbox" id="incluirNoAprobados">
        Incluir pendientes/rechazados
      </label>
      <button class="btn-ctrl btn-ctrl-secundario" onclick="window.close()">Cerrar</button>
      <button class="btn-ctrl btn-ctrl-primario" onclick="window.print()">🖨️ Imprimir / Guardar PDF</button>
    </div>
  </div>

  <div class="page-container" id="pageContainer">
    <div class="loading">Cargando carnets...</div>
  </div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const idEquipo = urlParams.get('id_equipo');

if (!requireAuth([ROLES.ENTRENADOR, ROLES.ADMIN])) { /* redirige */ }

if (!idEquipo) {
  document.getElementById('pageContainer').innerHTML =
    '<div class="empty"><h3>Falta el ID del equipo</h3><p>Esta página debe abrirse con el parámetro ?id_equipo=...</p></div>';
}

let equipoActual = null;
let categoriaActual = null;
let jugadoresActuales = [];
let ctActuales = [];

// ─── Helper: primer valor no vacío entre varias claves posibles ───
function pick(obj, claves, def) {
  if (!obj) return def !== undefined ? def : '';
  for (const k of claves) {
    if (obj[k] !== undefined && obj[k] !== null && obj[k] !== '') {
      return obj[k];
    }
  }
  return def !== undefined ? def : '';
}

async function cargar() {
  // obtenerEquipo YA devuelve: equipo, categoria, jugadores, cuerpo_tecnico
  const rEq = await apiCall('obtenerEquipo', { id: idEquipo });

  if (!rEq.success) {
    mostrarError('No se pudo cargar el equipo: ' + (rEq.mensaje || 'error desconocido'));
    return;
  }

  const d = rEq.data;
  equipoActual = d.equipo || {};
  categoriaActual = d.categoria || null;
  jugadoresActuales = d.jugadores || [];
  ctActuales = d.cuerpo_tecnico || [];

  const nombreEquipo = obtenerNombreEquipo();
  const catNombre = categoriaActual ? categoriaActual.nombre : (equipoActual.categoria || '');
  document.getElementById('ctrlTitulo').textContent = 'Carnets de ' + nombreEquipo;
  document.getElementById('ctrlSubtitulo').textContent =
    catNombre + ' · ' + jugadoresActuales.length + ' jugadores · ' + ctActuales.length + ' CT';

  renderizar();
}

function obtenerNombreEquipo() {
  // El equipo usa nombre_club (no tiene nombre propio salvo nombre_display)
  return pick(equipoActual, ['nombre_display', 'nombre_equipo', 'nombre_club', 'nombre'], 'Equipo');
}

function obtenerCategoriaId() {
  return pick(equipoActual, ['categoria', 'id_categoria'], '');
}

function renderizar() {
  const incluirNoAprobados = document.getElementById('incluirNoAprobados').checked;

  let jugadores = jugadoresActuales.slice();
  if (!incluirNoAprobados) {
    jugadores = jugadores.filter(j => pick(j, ['estado']) === 'APROBADO');
  }
  jugadores.sort((a, b) => {
    const na = Number(pick(a, ['numero_camiseta', 'numero', 'dorsal'], 999));
    const nb = Number(pick(b, ['numero_camiseta', 'numero', 'dorsal'], 999));
    return na - nb;
  });

  let ct = ctActuales.slice();
  if (!incluirNoAprobados) {
    ct = ct.filter(m => pick(m, ['estado']) === 'APROBADO');
  }

  const items = [
    ...jugadores.map(j => ({ tipo: 'jugador', data: j })),
    ...ct.map(m => ({ tipo: 'ct', data: m }))
  ];

  if (items.length === 0) {
    document.getElementById('pageContainer').innerHTML = `
      <div class="empty">
        <h3>No hay personas para generar carnets</h3>
        <p>Verifica que tengas jugadores aprobados. Probá marcar "Incluir pendientes/rechazados".</p>
      </div>`;
    return;
  }

  const POR_PAGINA = 8;
  const paginas = [];
  for (let i = 0; i < items.length; i += POR_PAGINA) {
    paginas.push(items.slice(i, i + POR_PAGINA));
  }

  let html = '';
  paginas.forEach(paginaItems => {
    html += '<div class="page">';
    paginaItems.forEach(item => {
      html += item.tipo === 'jugador' ? renderCarnetJugador(item.data) : renderCarnetCT(item.data);
    });
    const vacios = POR_PAGINA - paginaItems.length;
    for (let i = 0; i < vacios; i++) html += '<div style="visibility:hidden;"></div>';
    html += '</div>';
  });

  document.getElementById('pageContainer').innerHTML = html;
}

function renderCarnetJugador(j) {
  const nombres = pick(j, ['nombres', 'nombre']);
  const apellidos = pick(j, ['apellidos', 'apellido']);
  const nombreCompleto = (nombres + ' ' + apellidos).trim() ||
                         pick(j, ['nombre_completo'], '—');
  const doc = pick(j, ['documento', 'numero_documento', 'cedula', 'identificacion'], '—');
  const fechaNac = formatearFechaCarnet(pick(j, ['fecha_nacimiento', 'fecha_nac', 'nacimiento']));
  const sangre = pick(j, ['tipo_sangre', 'rh', 'grupo_sanguineo'], '');
  const numero = pick(j, ['numero_camiseta', 'numero', 'dorsal'], '');
  const dorsal = numero ? String(numero).padStart(2, '0') : '—';
  const sinDorsal = !numero;
  const posicion = String(pick(j, ['posicion', 'posicion_campo'], 'JUGADOR')).toUpperCase();
  const fotoUrl = pick(j, ['foto_url', 'foto', 'url_foto'], '');
  const foto = fotoUrl
    ? `<img src="${escapeHtml(fotoUrl)}" alt="" onerror="this.parentNode.innerHTML='<div class=&quot;carnet-foto-placeholder&quot;>👤</div>'">`
    : '<div class="carnet-foto-placeholder">👤</div>';

  return `
    <div class="carnet">
      ${renderHeaderCarnet()}
      <div class="carnet-body">
        <div class="carnet-foto">${foto}</div>
        <div class="carnet-datos">
          <div class="carnet-nombre">${escapeHtml(nombreCompleto)}</div>
          <div class="carnet-dato"><strong>CC</strong> ${escapeHtml(doc)}</div>
          <div class="carnet-dato"><strong>Nac</strong> ${escapeHtml(fechaNac)}</div>
          ${sangre ? `<div class="carnet-dato"><strong>RH</strong> <span class="carnet-sangre">${escapeHtml(sangre)}</span></div>` : ''}
          <div class="carnet-pos">${escapeHtml(posicion)}</div>
        </div>
      </div>
      <div class="carnet-dorsal ${sinDorsal ? 'sin' : ''}">${escapeHtml(dorsal)}</div>
      ${renderFooterCarnet()}
    </div>`;
}

function renderCarnetCT(m) {
  const nombreCompleto = pick(m, ['nombre_completo']) ||
    ((pick(m, ['nombres', 'nombre']) + ' ' + pick(m, ['apellidos', 'apellido'])).trim()) || '—';
  const doc = pick(m, ['documento', 'numero_documento', 'cedula', 'identificacion'], '—');
  const fechaNac = formatearFechaCarnet(pick(m, ['fecha_nacimiento', 'fecha_nac', 'nacimiento']));
  const sangre = pick(m, ['tipo_sangre', 'rh', 'grupo_sanguineo'], '');
  const rol = String(pick(m, ['rol', 'cargo'], 'CUERPO TÉCNICO')).toUpperCase();
  const fotoUrl = pick(m, ['foto_url', 'foto', 'url_foto'], '');
  const foto = fotoUrl
    ? `<img src="${escapeHtml(fotoUrl)}" alt="" onerror="this.parentNode.innerHTML='<div class=&quot;carnet-foto-placeholder&quot;>👔</div>'">`
    : '<div class="carnet-foto-placeholder">👔</div>';

  return `
    <div class="carnet">
      ${renderHeaderCarnet()}
      <div class="carnet-body">
        <div class="carnet-foto">${foto}</div>
        <div class="carnet-datos">
          <div class="carnet-nombre">${escapeHtml(nombreCompleto)}</div>
          <div class="carnet-dato"><strong>CC</strong> ${escapeHtml(doc)}</div>
          <div class="carnet-dato"><strong>Nac</strong> ${escapeHtml(fechaNac)}</div>
          ${sangre ? `<div class="carnet-dato"><strong>RH</strong> <span class="carnet-sangre">${escapeHtml(sangre)}</span></div>` : ''}
          <div class="carnet-pos ct">${escapeHtml(rol)}</div>
        </div>
      </div>
      ${renderFooterCarnet()}
    </div>`;
}

function renderHeaderCarnet() {
  const nombreEquipo = obtenerNombreEquipo().toUpperCase();
  const catId = obtenerCategoriaId();
  // El escudo viene en el propio equipo (escudo_url)
  const escudoUrl = pick(equipoActual, ['escudo_url', 'escudo', 'logo_url'], '');
  const escudo = escudoUrl
    ? `<img src="${escapeHtml(escudoUrl)}" alt="" onerror="this.parentNode.innerHTML='${siglas(nombreEquipo)}'">`
    : siglas(nombreEquipo);

  return `
    <div class="carnet-header">
      <div class="carnet-header-club">
        <div class="carnet-escudo">${escudo}</div>
        <div class="carnet-equipo-nombre">${escapeHtml(nombreEquipo)}</div>
      </div>
      <div class="carnet-categoria-badge">${escapeHtml(catId)}</div>
    </div>`;
}

function renderFooterCarnet() {
  return `<div class="carnet-footer">XVI COPA BON BON BUM 2026 · LA PAILA, ZARZAL · OCTUBRE</div>`;
}

function siglas(nombre) {
  if (!nombre) return '?';
  const partes = String(nombre).trim().split(/\s+/);
  if (partes.length === 1) return partes[0].substring(0, 2).toUpperCase();
  return (partes[0].charAt(0) + partes[partes.length - 1].charAt(0)).toUpperCase();
}

function formatearFechaCarnet(valor) {
  if (!valor) return '—';
  const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  let d = null;
  if (typeof valor === 'string') {
    if (/^\d{4}-\d{2}-\d{2}/.test(valor)) {
      d = new Date(valor);
    } else if (/^\d{1,2}\/\d{1,2}\/\d{4}/.test(valor)) {
      const p = valor.substring(0, 10).split('/');
      d = new Date(p[2], p[1] - 1, p[0]);
    } else {
      d = new Date(valor);
    }
  } else if (valor instanceof Date) {
    d = valor;
  }
  if (!d || isNaN(d.getTime())) return String(valor);
  return String(d.getUTCDate()).padStart(2, '0') + ' ' +
         meses[d.getUTCMonth()] + ' ' + d.getUTCFullYear();
}

function mostrarError(msg) {
  document.getElementById('pageContainer').innerHTML =
    `<div class="empty"><h3>Error</h3><p>${escapeHtml(msg)}</p></div>`;
}

document.getElementById('incluirNoAprobados').addEventListener('change', renderizar);

if (idEquipo) cargar();
</script>

</body>
</html>
