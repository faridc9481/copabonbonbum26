<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión · Copa Bon Bon Bum 2026</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800;900&family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="_shared.js"></script>

<style>
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--rojo) 0%, var(--rojo-osc) 100%);
    padding: 20px;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: absolute;
    top: -100px;
    right: -100px;
    width: 400px;
    height: 400px;
    background: var(--amarillo);
    border-radius: 50%;
    opacity: 0.15;
  }
  body::after {
    content: '';
    position: absolute;
    bottom: -120px;
    left: -80px;
    width: 300px;
    height: 300px;
    background: var(--verde);
    border-radius: 50%;
    opacity: 0.18;
  }

  .login-box {
    background: var(--blanco);
    border-radius: 24px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.3);
    position: relative;
    z-index: 2;
  }

  .login-brand {
    text-align: center;
    margin-bottom: 32px;
  }
  .brand-mark {
    width: 72px;
    height: 72px;
    background: var(--rojo);
    border-radius: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--amarillo);
    font-family: 'Nunito', sans-serif;
    font-size: 40px;
    font-weight: 900;
    letter-spacing: -3px;
    margin-bottom: 18px;
    position: relative;
    box-shadow: 0 8px 20px rgba(227,6,19,0.25);
  }
  .brand-mark::after {
    content: '';
    position: absolute;
    top: -4px; right: -4px;
    width: 18px; height: 18px;
    background: var(--verde);
    border-radius: 50%;
    border: 4px solid var(--blanco);
  }
  .brand-title {
    font-family: 'Nunito', sans-serif;
    font-size: 24px;
    font-weight: 900;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }
  .brand-subtitle {
    color: var(--gris);
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
    margin-top: 6px;
  }

  .login-form .form-input {
    padding: 14px 16px;
    font-size: 15px;
  }

  .alerta {
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 18px;
    display: none;
  }
  .alerta-info { background: rgba(0,0,0,0.04); color: var(--texto-2); display: block; }
  .alerta-error { background: rgba(227,6,19,0.08); color: var(--rojo); display: block; border: 1px solid rgba(227,6,19,0.2); }

  .btn-login-full {
    width: 100%;
    padding: 14px;
    font-size: 15px;
    margin-top: 8px;
  }

  .login-back {
    text-align: center;
    margin-top: 24px;
    font-size: 13px;
  }
  .login-back a {
    color: var(--gris);
    text-decoration: none;
    font-weight: 600;
  }
  .login-back a:hover { color: var(--rojo); }

  @media (max-width: 480px) {
    .login-box { padding: 36px 24px; }
  }
</style>
</head>
<body>

  <div class="login-box">

    <div class="login-brand">
      <div class="brand-mark">B</div>
      <div class="brand-title">Copa Bon Bon Bum</div>
      <div class="brand-subtitle">XVI Edición · 2026</div>
    </div>

    <div id="alertaCont"></div>

    <form id="loginForm" class="login-form">
      <div class="form-grupo">
        <label class="form-label" for="usuario">Usuario</label>
        <input type="text" id="usuario" class="form-input" autocomplete="username"
               autocapitalize="none" autocorrect="off" spellcheck="false" required>
      </div>

      <div class="form-grupo">
        <label class="form-label" for="password">Contraseña</label>
        <input type="password" id="password" class="form-input" autocomplete="current-password" required>
      </div>

      <button type="submit" class="btn btn-primario btn-login-full" id="btnLogin">
        Iniciar sesión
      </button>
    </form>

    <div class="login-back">
      <a href="index.html">← Volver al sitio público</a>
    </div>
  </div>

<script>
// Si ya hay sesión activa, redirigir según rol
(function checkSesionPrevia() {
  const token = sessionGet('token');
  const rol = sessionGet('rol');
  if (token && rol) {
    redirigirSegunRol(rol);
  }
})();

// Mostrar alerta según motivo de redirect
(function mostrarMotivo() {
  const params = new URLSearchParams(window.location.search);
  const reason = params.get('reason');
  const cont = document.getElementById('alertaCont');

  if (reason === 'expired') {
    cont.innerHTML = '<div class="alerta alerta-info">Su sesión expiró. Inicie sesión de nuevo.</div>';
  } else if (reason === 'no_auth') {
    cont.innerHTML = '<div class="alerta alerta-info">Debe iniciar sesión para acceder.</div>';
  } else if (reason === 'forbidden') {
    cont.innerHTML = '<div class="alerta alerta-error">No tiene permisos para acceder a esa sección.</div>';
  }
})();

function redirigirSegunRol(rol) {
  switch (rol) {
    case 'ADMIN':
      window.location.href = 'admin.html';
      break;
    case 'PLANILLADOR':
      window.location.href = 'planillador.html';
      break;
    case 'ENTRENADOR':
      window.location.href = 'entrenador.html';
      break;
    default:
      // Por si acaso
      window.location.href = 'admin.html';
  }
}

function mostrarError(msg) {
  document.getElementById('alertaCont').innerHTML =
    '<div class="alerta alerta-error">' + escapeHtml(msg) + '</div>';
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const usuario = document.getElementById('usuario').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btnLogin');

  if (!usuario || !password) return;

  btn.disabled = true;
  btn.textContent = 'Verificando...';

  try {
    const r = await apiCall('login', { usuario, password });

    if (!r.success) {
      mostrarError(r.mensaje || 'Error al iniciar sesión');
      btn.disabled = false;
      btn.textContent = 'Iniciar sesión';
      return;
    }

    // Guardar sesión
    sessionSet('token', r.data.token);
    sessionSet('usuario', r.data.usuario);
    sessionSet('rol', r.data.rol);
    sessionSet('nombre', r.data.nombre_completo);
    sessionSet('id_equipo', r.data.id_equipo_asociado || '');

    // Redirigir
    redirigirSegunRol(r.data.rol);

  } catch (e) {
    mostrarError('Error de conexión: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Iniciar sesión';
  }
});

// Auto-focus en usuario al cargar
document.getElementById('usuario').focus();
</script>

</body>
</html>
